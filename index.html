<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yaoxi | 主页</title>
    <meta name="description" content="Yaoxi 的个人主页，记录学习方向、个人简介与联系方式。">
    <meta name="author" content="Yaoxi">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#050816">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:title" content="yaoxi | 主页">
    <meta property="og:description" content="Yaoxi 的个人主页，记录学习方向、个人简介与联系方式。">
    <meta property="og:url" content="https://yaoxi.wiki/">
    <meta property="og:site_name" content="Yaoxi">
    <meta property="og:image" content="https://yaoxi.wiki/avatar.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="yaoxi | 主页">
    <meta name="twitter:description" content="Yaoxi 的个人主页，记录学习方向、个人简介与联系方式。">
    <meta name="twitter:image" content="https://yaoxi.wiki/avatar.jpg">
    <link rel="canonical" href="https://yaoxi.wiki/">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "Yaoxi",
            "url": "https://yaoxi.wiki/",
            "image": "https://yaoxi.wiki/avatar.jpg",
            "description": "一名前端新人，用个人主页记录自己的学习方向与联系方式。",
            "jobTitle": "Student",
            "email": "yaoxiovo@gmail.com"
        }
    </script>
</head>
<body>
    <div class="background">
        <video autoplay muted loop playsinline>
            <source src="home.mp4" type="video/mp4">
        </video>
    </div>

    <div class="page">
        <header class="top-bar">
            <div class="top-left">
                <div class="status-dot"></div>
                <div class="page-info">
                    <span class="page-title">YaoXi</span>
                    <span class="page-subtitle">Profile</span>
                </div>
            </div>
            <div class="top-right">
                <span class="location"><i class="ri-map-pin-line"></i> 云浮, CN</span>
                <span class="time-display" id="clock">00:00</span>
            </div>
        </header>

        <main class="content">
            <section class="avatar-wrapper">
                <div class="avatar-circle">
                    <div class="avatar-inner">
                        <img src="avatar.jpg" alt="瑶曦">
                    </div>
                </div>
                <div class="avatar-info">
                    <h1 class="avatar-name">瑶曦</h1>
                    <div class="avatar-tags">
                        <span class="avatar-tag">学生</span>
                        <span class="avatar-tag">前端新人</span>
                    </div>
                </div>
            </section>

            <section class="cards-grid">
                <article class="card">
                    <div class="card-content-wrapper">
                        <div class="card-header">
                            <div class="card-icon"><i class="ri-user-line"></i></div>
                            <h2 class="card-title">关于我</h2>
                        </div>
                        <div class="card-body">
                            <p>你好 我是 Yaoxi，一名正在学习前端的学生。</p>
                            <p>目前专注于 <strong>HTML5 & CSS3</strong>，希望做出清晰、好看、实用的网页界面。</p>
                        </div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-content-wrapper">
                        <div class="card-header">
                            <div class="card-icon"><i class="ri-code-s-slash-line"></i></div>
                            <h2 class="card-title">技能树</h2>
                        </div>
                        <div class="card-body">
                            <div class="skill-item">
                                <div class="skill-meta"><span>HTML / CSS</span><span>45%</span></div>
                                <div class="skill-track"><div class="skill-fill" style="--percent: 45%"></div></div>
                            </div>
                            <div class="skill-item">
                                <div class="skill-meta"><span>JavaScript</span><span>20%</span></div>
                                <div class="skill-track"><div class="skill-fill" style="--percent: 20%"></div></div>
                            </div>
                            <div class="skill-item">
                                <div class="skill-meta"><span>Design</span><span>2%</span></div>
                                <div class="skill-track"><div class="skill-fill" style="--percent: 2%"></div></div>
                            </div>
                        </div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-content-wrapper">
                        <div class="card-header">
                            <div class="card-icon"><i class="ri-share-forward-line"></i></div>
                            <h2 class="card-title">找到我</h2>
                        </div>
                        <div class="card-body">
                            <p>欢迎交流学习心得。</p>
                            <div class="social-links">
                                <button class="social-btn" type="button" onclick="openModal('QQ', '3487445594', 'ri-qq-fill')">
                                    <i class="ri-qq-fill"></i> QQ
                                </button>
                                <button class="social-btn" type="button" onclick="openModal('Email', 'yaoxiovo@gmail.com', 'ri-mail-send-fill')">
                                    <i class="ri-mail-send-fill"></i> Email
                                </button>
                            </div>
                        </div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-content-wrapper">
                        <div class="card-header">
                            <div class="card-icon"><i class="ri-window-line"></i></div>
                            <h2 class="card-title">项目</h2>
                        </div>
                        <div class="card-body">
                            <p>生活分享与实践站。</p>
                            <a class="project-link" href="https://blog.yaoxi.wiki" target="_blank" rel="noopener noreferrer">
                                <span class="project-link-label">
                                    <strong>Blog</strong>
                                    <span>blog.yaoxi.wiki</span>
                                </span>
                                <i class="ri-arrow-right-up-line"></i>
                            </a>
                        </div>
                    </div>
                </article>
            </section>
        </main>

        <footer class="footer-credit">
            <div class="footer-container">
                <div class="credit-capsule">
                    <span>Designed by</span>
                    <a href="https://xingyu.ink" target="_blank" rel="noopener noreferrer" class="credit-link">星浴</a>
                </div>
                <div class="icp-info">
                    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">
                        桂ICP备2025055890号
                    </a>
                </div>
            </div>
        </footer>

        <div id="contact-modal" class="modal-overlay">
            <div class="modal-box">
                <div class="toast" id="copy-toast">已复制到剪贴板</div>
                <div class="modal-icon-wrapper">
                    <i id="modal-icon" class="ri-chat-smile-3-line"></i>
                </div>
                <h3 class="modal-title" id="modal-title">联系方式</h3>
                <p class="modal-desc">点击下方按钮即可复制</p>
                <div class="modal-data-box" id="modal-data">Loading...</div>
                <div class="modal-actions">
                    <button class="modal-btn btn-cancel" type="button" onclick="closeModal()">关闭</button>
                    <button class="modal-btn btn-copy" type="button" onclick="copyData()">复制</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
